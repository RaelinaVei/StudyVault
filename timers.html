<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyVault | Pro Focus Suite</title>
    <style>
        :root {
            --primary: #bc13fe; 
            --text: #ffffff;
            --subtext: #cbd5e1;
            --bg-dark: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glow: 0 0 15px rgba(188, 19, 254, 0.6);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at top right, #1a0b2e, #050505);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .nav-header {
            max-width: 1200px;
            margin: 0 auto 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            text-decoration: none;
            color: var(--subtext);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .back-btn:hover { color: var(--primary); }

        .main-layout {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        /* --- Timer Section --- */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .timer-display {
            font-size: 6rem;
            font-weight: 800;
            text-align: center;
            margin: 30px 0;
            font-variant-numeric: tabular-nums;
            text-shadow: var(--glow);
        }

        .timer-presets {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 30px;
        }

        .preset-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .preset-btn:hover { background: var(--primary); border-color: var(--primary); }

        .controls {
            display: flex;
            gap: 15px;
        }

        .btn-main {
            flex: 2;
            padding: 18px;
            border-radius: 15px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 800;
            cursor: pointer;
            box-shadow: var(--glow);
            transition: 0.3s;
        }

        .btn-reset {
            flex: 1;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 15px;
            cursor: pointer;
        }

        /* --- Task & Accountability Section --- */
        .section-title {
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            outline: none;
        }

        .add-btn {
            background: var(--primary);
            border: none;
            color: white;
            padding: 0 20px;
            border-radius: 12px;
            cursor: pointer;
        }

        .list-container {
            list-style: none;
            padding: 0;
            max-height: 400px;
            overflow-y: auto;
        }

        .list-item {
            background: rgba(255,255,255,0.03);
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            animation: fadeIn 0.3s ease;
        }

        .list-item input[type="checkbox"] {
            accent-color: var(--primary);
            width: 18px;
            height: 18px;
        }

        .list-item.done span {
            text-decoration: line-through;
            opacity: 0.5;
        }

        .delete-btn {
            margin-left: auto;
            background: none;
            border: none;
            color: #ff4d4d;
            cursor: pointer;
            font-size: 1.2rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="index.html" class="back-btn">← Back to Dashboard</a>
        <div style="font-weight: 800; letter-spacing: 2px;">STUDYVAULT PRO</div>
    </div>

    <div class="main-layout">
        
        <div class="glass-card">
            <div class="section-title">⏱️ Focus Timer</div>
            <div class="timer-presets">
                <button class="preset-btn" onclick="setTimer(25)">25m</button>
                <button class="preset-btn" onclick="setTimer(50)">50m</button>
                <button class="preset-btn" onclick="setTimer(15)">15m</button>
            </div>
            
            <div class="timer-display" id="display">25:00</div>
            
            <div class="controls">
                <button class="btn-main" id="startBtn" onclick="toggleTimer()">START SESSION</button>
                <button class="btn-reset" onclick="resetTimer()">RESET</button>
            </div>
        </div>

        <div class="glass-card">
            <div class="section-title">🚀 Study Objectives</div>
            
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="What are we crushing today?">
                <button class="add-btn" onclick="addTask()">Add</button>
            </div>

            <ul class="list-container" id="taskList">
                </ul>

            <div class="section-title" style="margin-top: 40px;">⚖️ Accountability Checks</div>
            <div class="list-container">
                <div class="list-item">
                    <input type="checkbox" id="water"> <span>Hydrated (1L+)</span>
                </div>
                <div class="list-item">
                    <input type="checkbox" id="phone"> <span>Phone in DND Mode</span>
                </div>
                <div class="list-item">
                    <input type="checkbox" id="desk"> <span>Clean Workspace</span>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- TIMER LOGIC ---
        let timeLeft = 25 * 60;
        let timerId = null;
        let isRunning = false;

        function setTimer(mins) {
            resetTimer();
            timeLeft = mins * 60;
            updateDisplay();
        }

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('display').textContent = 
                `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function toggleTimer() {
            const btn = document.getElementById('startBtn');
            if (isRunning) {
                clearInterval(timerId);
                btn.textContent = "RESUME SESSION";
            } else {
                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        alert("Session complete!");
                    }
                }, 1000);
                btn.textContent = "PAUSE";
            }
            isRunning = !isRunning;
        }

        function resetTimer() {
            clearInterval(timerId);
            isRunning = false;
            timeLeft = 25 * 60;
            updateDisplay();
            document.getElementById('startBtn').textContent = "START SESSION";
        }

        // --- PERSISTENT TASK LOGIC ---
        const taskInput = document.getElementById('taskInput');
        const taskList = document.getElementById('taskList');

        // Load tasks on startup
        document.addEventListener('DOMContentLoaded', () => {
            const savedTasks = JSON.parse(localStorage.getItem('studyVaultTasks')) || [];
            savedTasks.forEach(task => renderTask(task.text, task.completed));
        });

        function addTask() {
            const text = taskInput.value.trim();
            if (text === "") return;
            renderTask(text, false);
            saveTasks();
            taskInput.value = "";
        }

        function renderTask(text, completed) {
            const li = document.createElement('li');
            li.className = `list-item ${completed ? 'done' : ''}`;
            li.innerHTML = `
                <input type="checkbox" ${completed ? 'checked' : ''} onchange="toggleDone(this)">
                <span>${text}</span>
                <button class="delete-btn" onclick="deleteTask(this)">×</button>
            `;
            taskList.appendChild(li);
        }

        function toggleDone(el) {
            el.parentElement.classList.toggle('done');
            saveTasks();
        }

        function deleteTask(el) {
            el.parentElement.remove();
            saveTasks();
        }

        function saveTasks() {
            const tasks = [];
            document.querySelectorAll('#taskList .list-item').forEach(li => {
                tasks.push({
                    text: li.querySelector('span').textContent,
                    completed: li.querySelector('input').checked
                });
            });
            localStorage.setItem('studyVaultTasks', JSON.stringify(tasks));
        }

        // Enter key to add task
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });
    </script>
</body>
</html>
