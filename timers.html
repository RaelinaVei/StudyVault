<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyVault | Focus & Accountability</title>
    <style>
        :root {
            --primary: #bc13fe; 
            --text: #ffffff;
            --subtext: #cbd5e1;
            --bg-image: url('https://w0.peakpx.com/wallpaper/700/152/HD-wallpaper-mountains-in-dark-night-background-dark.jpg');
            --card-bg: rgba(255, 255, 255, 0.07); 
            --glow: 0 0 15px rgba(188, 19, 254, 0.6);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .nav-header { max-width: 1000px; margin: 0 auto 40px; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { text-decoration: none; color: var(--subtext); font-weight: 600; transition: 0.3s; }
        .back-btn:hover { color: var(--primary); }

        .main-layout {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 30px;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .section-title { 
            font-size: 1.1rem; 
            color: var(--primary); 
            margin-bottom: 25px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            font-weight: 800; 
        }

        /* --- Timer Styling --- */
        .timer-display { 
            font-size: 5.5rem; 
            font-weight: 800; 
            text-align: center; 
            margin: 20px 0; 
            text-shadow: var(--glow); 
            font-family: 'Courier New', Courier, monospace;
        }
        
        .timer-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .timer-inputs label { display: block; font-size: 0.7rem; color: var(--subtext); margin-bottom: 5px; text-transform: uppercase; }

        /* --- Accountability List Styling --- */
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"], input[type="number"] { 
            background: rgba(0,0,0,0.3); 
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 12px; 
            border-radius: 12px; 
            color: white; 
            outline: none; 
            width: 100%;
        }

        .list-container { max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .list-item { 
            background: rgba(255,255,255,0.03); 
            margin-bottom: 10px; 
            padding: 15px; 
            border-radius: 15px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            transition: 0.3s;
        }

        .list-item.done span { text-decoration: line-through; color: rgba(255,255,255,0.4); }
        .list-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }

        /* --- Dropdowns & Trash --- */
        details { background: rgba(0,0,0,0.2); border-radius: 12px; margin-top: 15px; border: 1px solid rgba(255,255,255,0.05); }
        summary { padding: 12px; cursor: pointer; font-size: 0.85rem; color: var(--subtext); font-weight: 600; }

        .btn { 
            background: var(--primary); 
            border: none; 
            color: white; 
            padding: 15px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover { box-shadow: var(--glow); transform: translateY(-2px); }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; background: rgba(255,255,255,0.1); border-radius: 8px; }
        .btn-delete { background: #ff4d4d22; color: #ff4d4d; border: 1px solid #ff4d4d44; }

        @media (max-width: 850px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="index.html" class="back-btn">← Back to Dashboard</a>
        <div style="font-weight: 800; letter-spacing: 2px; color: var(--primary);">STUDYVAULT PRO</div>
    </div>

    <div class="main-layout">
        
        <div class="glass-card">
            <div class="section-title">⏱️ Focus Session</div>
            
            <div class="timer-inputs">
                <div>
                    <label>Study (Mins)</label>
                    <input type="number" id="studyMin" value="25">
                </div>
                <div>
                    <label>Break (Mins)</label>
                    <input type="number" id="breakMin" value="5">
                </div>
            </div>

            <div class="timer-display" id="timerDisplay">25:00</div>
            
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button class="btn" onclick="toggleTimer()" id="pomoBtn">Start Session</button>
                <button class="btn" style="background: rgba(255,255,255,0.05);" onclick="resetTimer()">Reset</button>
            </div>
        </div>

        <div class="glass-card">
            <div class="section-title">⚖️ Accountability Vault</div>
            
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Enter a custom goal...">
                <button class="btn" onclick="addTask()" style="padding: 12px 25px;">Add</button>
            </div>

            <div class="list-container" id="currentTasks"></div>

            <div class="section-title" style="margin-top: 30px; font-size: 0.9rem; opacity: 0.6;">📜 Weekly History</div>
            <div id="historyContainer"></div>

            <details>
                <summary style="color: #ff4d4d;">🗑️ Deleted Items (30 Days)</summary>
                <div id="trashContainer" style="padding: 15px; font-size: 0.8rem; opacity: 0.5;"></div>
            </details>
        </div>

    </div>

    <script>
        // --- DATA PERSISTENCE ---
        let vaultData = JSON.parse(localStorage.getItem('focusVaultData')) || {
            tasks: [],
            history: {},
            trash: []
        };

        // --- TIMER LOGIC ---
        let timeLeft = 25 * 60;
        let timerId = null;
        let isRunning = false;

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timerDisplay').textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function toggleTimer() {
            const btn = document.getElementById('pomoBtn');
            if (!isRunning) {
                if (timeLeft === 25 * 60) timeLeft = document.getElementById('studyMin').value * 60;
                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        alert("Session complete! Time for a break.");
                        timeLeft = document.getElementById('breakMin').value * 60;
                        updateDisplay();
                    }
                }, 1000);
                btn.textContent = "Pause";
            } else {
                clearInterval(timerId);
                btn.textContent = "Resume";
            }
            isRunning = !isRunning;
        }

        function resetTimer() {
            clearInterval(timerId);
            isRunning = false;
            timeLeft = document.getElementById('studyMin').value * 60;
            updateDisplay();
            document.getElementById('pomoBtn').textContent = "Start Session";
        }

        // --- ACCOUNTABILITY LOGIC ---
        function addTask() {
            const input = document.getElementById('taskInput');
            if (!input.value.trim()) return;
            
            const newTask = {
                id: Date.now(),
                text: input.value,
                done: false,
                date: new Date().toLocaleDateString()
            };
            
            vaultData.tasks.push(newTask);
            input.value = "";
            saveAndRender();
        }

        function toggleDone(id) {
            const task = vaultData.tasks.find(t => t.id === id);
            if (task) task.done = !task.done;
            saveAndRender();
        }

        function moveToTrash(id) {
            const index = vaultData.tasks.findIndex(t => t.id === id);
            const task = vaultData.tasks.splice(index, 1)[0];
            task.deletedAt = Date.now();
            vaultData.trash.push(task);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('focusVaultData', JSON.stringify(vaultData));
            renderTasks();
            renderHistory();
            renderTrash();
        }

        function renderTasks() {
            const container = document.getElementById('currentTasks');
            container.innerHTML = "";
            const today = new Date().toLocaleDateString();

            // Auto-move tasks from previous days to history
            vaultData.tasks = vaultData.tasks.filter(t => {
                if (t.date !== today) {
                    if (!vaultData.history[t.date]) vaultData.history[t.date] = [];
                    vaultData.history[t.date].push(t);
                    return false;
                }
                return true;
            });

            vaultData.tasks.forEach(t => {
                container.innerHTML += `
                    <div class="list-item ${t.done ? 'done' : ''}">
                        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleDone(${t.id})">
                        <span style="flex:1">${t.text}</span>
                        <button class="btn-sm btn-delete" onclick="moveToTrash(${t.id})">🗑️</button>
                    </div>`;
            });
        }

        function renderHistory() {
            const container = document.getElementById('historyContainer');
            container.innerHTML = "";
            const dates = Object.keys(vaultData.history).sort().reverse();
            const now = Date.now();

            dates.forEach(date => {
                // Remove history older than 7 days
                const diff = (now - new Date(date)) / (1000 * 60 * 60 * 24);
                if (diff > 7) { delete vaultData.history[date]; return; }

                const items = vaultData.history[date].map(t => `<div style="margin-bottom:5px; opacity:0.7;">• ${t.text}</div>`).join('');
                container.innerHTML += `<details><summary>${date}</summary><div style="padding:10px;">${items}</div></details>`;
            });
        }

        function renderTrash() {
            const container = document.getElementById('trashContainer');
            const now = Date.now();
            // Permanent delete after 30 days
            vaultData.trash = vaultData.trash.filter(t => (now - t.deletedAt) < (30 * 24 * 60 * 60 * 1000));
            container.innerHTML = vaultData.trash.length ? 
                vaultData.trash.map(t => `<div>[DELETED] ${t.text}</div>`).join('') : 
                "No items in trash.";
        }

        // Init
        renderTasks(); renderHistory(); renderTrash();
    </script>
</body>
</html>
