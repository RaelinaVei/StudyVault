<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biology Vault | StudyVault</title>
    <style>
        :root {
            --primary: #bc13fe; 
            --text: #ffffff;
            --subtext: #cbd5e1;
            --bg-image: url('https://w0.peakpx.com/wallpaper/700/152/HD-wallpaper-mountains-in-dark-night-background-dark.jpg');
            --card-bg: rgba(255, 255, 255, 0.07); 
            --glow: 0 0 15px rgba(188, 19, 254, 0.8);
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            color: var(--text); margin: 0; padding: 20px; min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), var(--bg-image);
            background-size: cover; background-position: center; background-attachment: fixed;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        header { text-align: center; padding: 40px 0; }
        h1 { font-size: 3rem; color: var(--primary); text-transform: uppercase; text-shadow: var(--glow); margin: 0; }
        .back-btn { 
            text-decoration: none; color: white; background: rgba(255,255,255,0.1); 
            padding: 8px 15px; border-radius: 20px; font-size: 0.8rem; border: 1px solid var(--primary);
            transition: 0.3s;
        }
        .back-btn:hover { background: var(--primary); box-shadow: var(--glow); }

        /* Grid for Teacher/Person Cards */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .teacher-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: 0.3s;
        }

        .teacher-card:hover {
            border-color: var(--primary);
            box-shadow: var(--glow);
            transform: translateY(-5px);
        }

        .avatar {
            width: 60px; height: 60px;
            background: linear-gradient(45deg, var(--primary), #4facfe);
            border-radius: 50%; margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: bold;
            box-shadow: var(--glow);
        }

        .teacher-card h2 { margin: 10px 0; font-size: 1.4rem; color: var(--primary); }
        .teacher-card p { font-size: 0.85rem; color: var(--subtext); line-height: 1.4; margin-bottom: 20px; }

        .view-btn {
            display: block; text-decoration: none; color: white;
            background: rgba(188, 19, 254, 0.2); border: 1px solid var(--primary);
            padding: 10px; border-radius: 12px; font-weight: bold; transition: 0.3s;
        }

        .view-btn:hover { background: var(--primary); box-shadow: var(--glow); }

        footer { text-align: center; margin-top: 50px; padding: 20px; color: var(--subtext); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="index.html" class="back-btn">← DASHBOARD</a>
        <h1>Biology Vault 🧬</h1>
        <p style="margin-top:10px; opacity:0.8;">Premium resources curated from top educators.</p>
    </header>

    <div class="notes-grid">
        <script>
            const names = [
                "Lorem Ipsum", "Dolor Sit", "Amet Consectetur", 
                "Adipiscing Elit", "Sed Do", "Eiusmod Tempor", 
                "Incididunt Ut", "Labore Et", "Dolore Magna", "Aliqua Ut"
            ];

            names.forEach(name => {
                document.write(`
                    <div class="teacher-card">
                        <div class="avatar">${name[0]}</div>
                        <h2>${name}</h2>
                        <p>Complete handwritten and digital notes covering the full O-Level Biology syllabus.</p>
                        <a href="#" class="view-btn">ACCESS NOTES 📚</a>
                    </div>
                `);
            });
        </script>
    </div>

    <footer>
        <p>⚡ StudyVault • Education Refined</p>
    </footer>
</div>

</body>
</html>
