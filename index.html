<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyVault | My Notes Hub</title>
    <style>
        /* Color Variables */
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --subtext: #64748b;
            --link-bg: #f1f5f9;
        }

        /* Dark Mode Colors */
        [data-theme="dark"] {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --subtext: #94a3b8;
            --link-bg: #334155;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.6; transition: 0.3s; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { text-align: center; padding: 40px 0; }
        h1 { margin: 0; font-size: 2.5rem; color: var(--primary); }
        p.subtitle { color: var(--subtext); margin-top: 5px; }

        /* Dark Mode Toggle Button */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* The Grid */
        .subject-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; 
            margin-top: 30px; 
        }

        .subject-card { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid var(--link-bg);
            transition: transform 0.2s;
        }
        .subject-card:hover { transform: translateY(-5px); }
        .subject-card h2 { margin-top: 0; color: var(--primary); border-bottom: 2px solid var(--link-bg); padding-bottom: 10px; }

        /* Links inside cards */
        .links { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .links a { 
            text-decoration: none; 
            color: var(--text); 
            background: var(--link-bg); 
            padding: 8px 12px; 
            border-radius: 6px; 
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }
        .links a:hover { background: var(--primary); color: white; }
        .links a::after { content: '→'; opacity: 0.5; }

        footer { text-align: center; margin-top: 50px; color: var(--subtext); font-size: 0.8rem; }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>

<div class="container">
    <header>
        <h1>📚 StudyVault</h1>
        <p class="subtitle">Complete notes, past papers, and books for all subjects.</p>
    </header>

    <div class="subject-grid">
        <div class="subject-card">
            <h2>English</h2>
            <div class="links">
                <a href="english-notes.html">Notes</a>
                <a href="english-papers.html">Past Papers</a>
                <a href="english-books.html">Books</a>
            </div>
        </div>

        <div class="subject-card">
            <h2>Physics</h2>
            <div class="links">
                <a href="physics-notes.html">Notes</a>
                <a href="physics-papers.html">Past Papers</a>
                <a href="physics-books.html">Books</a>
            </div>
        </div>
        
        </div>

    <footer>
        <p>Made with ❤️ for Students</p>
    </footer>
</div>

<script>
    function toggleTheme() {
        const body = document.documentElement;
        const btn = document.getElementById('themeBtn');
        
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            btn.innerHTML = "🌙 Dark Mode";
        } else {
            body.setAttribute('data-theme', 'dark');
            btn.innerHTML = "☀️ Light Mode";
        }
    }
</script>

</body>
</html>
