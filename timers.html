<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyVault | Pro Focus Mode</title>
    <style>
        :root {
            --primary: #bc13fe; 
            --text: #ffffff;
            --subtext: #cbd5e1;
            --bg-image: url('https://w0.peakpx.com/wallpaper/700/152/HD-wallpaper-mountains-in-dark-night-background-dark.jpg');
            --card-bg: rgba(255, 255, 255, 0.07); 
            --glow: 0 0 20px rgba(188, 19, 254, 0.5);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .nav-header {
            max-width: 1100px;
            margin: 0 auto 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            text-decoration: none;
            color: var(--subtext);
            font-weight: 600;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .back-btn:hover { color: var(--primary); }

        .main-layout {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 40px;
            align-items: start;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 35px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .section-title {
            font-size: 1rem;
            color: var(--primary);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 800;
        }

        /* --- TIMER SECTION --- */
        .timer-inputs {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }

        .input-box { flex: 1; }

        .input-box label {
            display: block;
            font-size: 0.65rem;
            color: var(--subtext);
            margin-bottom: 8px;
            letter-spacing: 1px;
            font-weight: 700;
        }

        input[type="number"], input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px;
            border-radius: 12px;
            color: white;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(188, 19, 254, 0.2); }

        .timer-display {
            font-size: 6rem;
            font-weight: 800;
            text-align: center;
            margin: 50px 0;
            text-shadow: var(--glow);
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: -2px;
        }

        /* --- BUTTONS --- */
        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--glow);
            filter: brightness(1.1);
        }

        .btn-reset {
            margin-top: 12px;
            background: rgba(255,255,255,0.05);
            padding: 14px;
        }

        /* --- ACCOUNTABILITY SECTION --- */
        .task-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .list-container {
            max-height: 350px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .list-item {
            background: rgba(255,255,255,0.03);
            margin-bottom: 12px;
            padding: 16px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }

        .list-item:hover { background: rgba(255,255,255,0.06); }

        .list-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .list-item.done span {
            text-decoration: line-through;
            color: rgba(255,255,255,0.3);
        }

        .delete-btn {
            margin-left: auto;
            background: none;
            border: none;
            color: #ff4d4d;
            cursor: pointer;
            font-size: 1.2rem;
            opacity: 0.5;
            transition: 0.3s;
        }

        .delete-btn:hover { opacity: 1; transform: scale(1.2); }

        /* --- HISTORY & TRASH --- */
        details {
            margin-top: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        summary {
            padding: 15px;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--subtext);
            font-weight: 600;
            outline: none;
        }

        .history-content { padding: 0 15px 15px; font-size: 0.9rem; }

        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="index.html" class="back-btn">← BACK TO DASHBOARD</a>
        <div style="font-weight: 800; letter-spacing: 2px; color: var(--primary);">STUDYVAULT PRO</div>
    </div>

    <div class="main-layout">
        
        <div class="glass-card">
            <div class="section-title">⏱️ Focus Session</div>
            
            <div class="timer-inputs">
                <div class="input-box">
                    <label>STUDY (MINS)</label>
                    <input type="number" id="studyMin" value="25">
                </div>
                <div class="input-box">
                    <label>BREAK (MINS)</label>
                    <input type="number" id="breakMin" value="5">
                </div>
            </div>

            <div class="timer-display" id="timerDisplay">25:00</div>
            
            <div style="display: flex; flex-direction: column;">
                <button class="btn" onclick="toggleTimer()" id="pomoBtn">START SESSION</button>
                <button class="btn btn-reset" onclick="resetTimer()">RESET</button>
            </div>
        </div>

        <div class="glass-card">
            <div class="section-title">⚖️ Accountability Vault</div>
            
            <div class="task-input-group">
                <input type="text" id="taskInput" placeholder="Add a custom goal for today...">
                <button class="btn" onclick="addTask()" style="width: auto; padding: 0 25px;">ADD</button>
            </div>

            <div class="list-container" id="currentTasks">
                </div>

            <div class="section-title" style="margin-top: 40px; font-size: 0.8rem; opacity: 0.6;">📜 PREVIOUS 7 DAYS</div>
            <div id="historyContainer"></div>

            <details>
                <summary style="color: #ff4d4d;">🗑️ TRASH (30-DAY STORAGE)</summary>
                <div id="trashContainer" style="padding: 15px; font-size: 0.8rem; opacity: 0.5;"></div>
            </details>
        </div>

    </div>

    <script>
        // --- DATA STATE ---
        let vaultData = JSON.parse(localStorage.getItem('focusVaultData')) || {
            tasks: [],
            history: {},
            trash: []
        };

        // --- TIMER LOGIC ---
        let timeLeft = 25 * 60;
        let timerId = null;
        let isRunning = false;

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timerDisplay').textContent = 
                `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function toggleTimer() {
            const btn = document.getElementById('pomoBtn');
            if (!isRunning) {
                // If it's a fresh start, grab input values
                if (timeLeft === 25 * 60) {
                    timeLeft = document.getElementById('studyMin').value * 60;
                }
                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        alert("Session Finished!");
                        resetTimer();
                    }
                }, 1000);
                btn.textContent = "PAUSE SESSION";
                isRunning = true;
            } else {
                clearInterval(timerId);
                btn.textContent = "RESUME SESSION";
                isRunning = false;
            }
        }

        function resetTimer() {
            clearInterval(timerId);
            isRunning = false;
            timeLeft = document.getElementById('studyMin').value * 60;
            updateDisplay();
            document.getElementById('pomoBtn').textContent = "START SESSION";
        }

        // --- TASK & ACCOUNTABILITY LOGIC ---
        function addTask() {
            const input = document.getElementById('taskInput');
            if (!input.value.trim()) return;

            const task = {
                id: Date.now(),
                text: input.value,
                done: false,
                date: new Date().toLocaleDateString()
            };

            vaultData.tasks.push(task);
            input.value = "";
            saveAndRender();
        }

        function toggleTask(id) {
            const task = vaultData.tasks.find(t => t.id === id);
            if (task) task.done = !task.done;
            saveAndRender();
        }

        function deleteTask(id) {
            const index = vaultData.tasks.findIndex(t => t.id === id);
            const task = vaultData.tasks.splice(index, 1)[0];
            task.deletedAt = Date.now();
            vaultData.trash.push(task);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('focusVaultData', JSON.stringify(vaultData));
            renderTasks();
            renderHistory();
            renderTrash();
        }

        function renderTasks() {
            const container = document.getElementById('currentTasks');
            container.innerHTML = "";
            const today = new Date().toLocaleDateString();

            // Filter out old tasks and move to history
            vaultData.tasks = vaultData.tasks.filter(t => {
                if (t.date !== today) {
                    if (!vaultData.history[t.date]) vaultData.history[t.date] = [];
                    vaultData.history[t.date].push(t);
                    return false;
                }
                return true;
            });

            vaultData.tasks.forEach(t => {
                container.innerHTML += `
                    <div class="list-item ${t.done ? 'done' : ''}">
                        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${t.id})">
                        <span style="flex:1">${t.text}</span>
                        <button class="delete-btn" onclick="deleteTask(${t.id})">×</button>
                    </div>`;
            });
        }

        function renderHistory() {
            const container = document.getElementById('historyContainer');
            container.innerHTML = "";
            const dates = Object.keys(vaultData.history).sort().reverse();
            const now = Date.now();

            dates.forEach(date => {
                // Remove if older than 7 days
                const diff = (now - new Date(date)) / (1000 * 60 * 60 * 24);
                if (diff > 7) { delete vaultData.history[date]; return; }

                const items = vaultData.history[date].map(t => `<div style="margin-bottom:8px; opacity:0.7;">• ${t.text}</div>`).join('');
                container.innerHTML += `
                    <details>
                        <summary>${date}</summary>
                        <div class="history-content">${items}</div>
                    </details>`;
            });
        }

        function renderTrash() {
            const container = document.getElementById('trashContainer');
            const now = Date.now();
            // Purge trash older than 30 days
            vaultData.trash = vaultData.trash.filter(t => (now - t.deletedAt) < (30 * 24 * 60 * 60 * 1000));
            container.innerHTML = vaultData.trash.map(t => `<div style="margin-bottom:5px;">[X] ${t.text}</div>`).join('');
            if (vaultData.trash.length === 0) container.innerHTML = "Trash is empty.";
        }

        // Initialize on load
        renderTasks(); renderHistory(); renderTrash(); updateDisplay();
    </script>
</body>
</html>
