<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biology Notes | StudyVault</title>
    <style>
        :root {
            --primary: #bc13fe; 
            --text: #ffffff;
            --subtext: #cbd5e1;
            --bg-image: url('https://w0.peakpx.com/wallpaper/700/152/HD-wallpaper-mountains-in-dark-night-background-dark.jpg');
            --card-bg: rgba(255, 255, 255, 0.07); 
            --glow: 0 0 15px rgba(188, 19, 254, 0.8);
        }

        #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        body { 
            font-family: 'Segoe UI', sans-serif; color: var(--text); margin: 0; padding: 20px; 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), var(--bg-image);
            background-size: cover; background-attachment: fixed; overflow-x: hidden;
        }

        .container { max-width: 1000px; margin: 0 auto; position: relative; z-index: 1; }

        header { text-align: center; padding: 40px 0; }
        h1 { font-size: 3rem; color: var(--primary); text-transform: uppercase; text-shadow: var(--glow); margin: 0; }
        
        .back-btn { 
            text-decoration: none; color: white; background: rgba(0,0,0,0.3); 
            padding: 10px 20px; border-radius: 30px; border: 1px solid var(--primary);
            transition: 0.3s; display: inline-block; margin-bottom: 20px; backdrop-filter: blur(5px);
        }
        .back-btn:hover { background: var(--primary); color: black; box-shadow: var(--glow); }

        .teacher-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-top: 30px; }

        .teacher-card {
            background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 30px; text-align: center; transition: 0.3s;
        }
        .teacher-card:hover { border-color: var(--primary); box-shadow: var(--glow); transform: translateY(-8px); }

        .avatar {
            width: 70px; height: 70px; background: linear-gradient(45deg, var(--primary), #4facfe);
            border-radius: 50%; margin: 0 auto 15px auto; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: bold; box-shadow: var(--glow);
        }

        .teacher-card h2 { margin: 10px 0; font-size: 1.5rem; color: var(--primary); }
        .teacher-card p { font-size: 0.9rem; color: var(--subtext); line-height: 1.6; margin-bottom: 20px; }

        .access-btn {
            width: 100%; text-decoration: none; color: white; background: rgba(188, 19, 254, 0.2);
            border: 1px solid var(--primary); padding: 12px; border-radius: 12px; display: block; font-weight: bold; transition: 0.3s;
        }
        .access-btn:hover { background: var(--primary); color: black; box-shadow: var(--glow); }
    </style>
</head>
<body>

<canvas id="starfield"></canvas>

<div class="container">
    <header>
        <a href="index.html" class="back-btn">← Back to Dashboard</a>
        <h1>Biology Vault 🧬</h1>
    </header>

    <div class="teacher-grid">
        <div class="teacher-card">
            <div class="avatar">L</div>
            <h2>Dr. Lorem</h2>
            <p>Comprehensive handwritten notes covering the entire O-Level Biology syllabus.</p>
            <a href="#" class="access-btn">Access Notes</a>
        </div>
        </div>
</div>

<script>
    // Copy the starfield script from index.html here to keep the background moving
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let width, height, stars = [];
    function init() {
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
        stars = [];
        for (let i = 0; i < 400; i++) {
            stars.push({ x: Math.random() * width - width/2, y: Math.random() * height - height/2, z: Math.random() * width, opacity: Math.random() });
        }
    }
    function draw() {
        ctx.clearRect(0, 0, width, height);
        for (let i = 0; i < 400; i++) {
            let star = stars[i]; star.z -= 1.2;
            if (star.z <= 0) star.z = width;
            const sx = (star.x / star.z) * (width / 2) + width / 2;
            const sy = (star.y / star.z) * (height / 2) + height / 2;
            const size = (1 - star.z / width) * 2.5;
            ctx.beginPath(); ctx.fillStyle = `rgba(188, 19, 254, ${star.opacity})`;
            ctx.arc(sx, sy, size, 0, Math.PI * 2); ctx.fill();
        }
        requestAnimationFrame(draw);
    }
    window.addEventListener('resize', init);
    init(); draw();
</script>
</body>
</html>
