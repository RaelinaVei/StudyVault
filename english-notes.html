<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English | StudyVault</title>
    <style>
        :root {
            --primary: #bc13fe; 
            --text: #ffffff;
            --subtext: #cbd5e1;
            --bg-image: url('https://w0.peakpx.com/wallpaper/700/152/HD-wallpaper-mountains-in-dark-night-background-dark.jpg');
            --card-bg: rgba(255, 255, 255, 0.07); 
            --link-bg: rgba(255, 255, 255, 0.1);
            --glow: 0 0 15px rgba(188, 19, 254, 0.8);
        }
        [data-theme="dark"] {
            --primary: #df16ff;
            --card-bg: rgba(0, 0, 0, 0.5);
            --link-bg: rgba(255, 255, 255, 0.05);
        }
        #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        body { 
            font-family: 'Segoe UI', sans-serif; color: var(--text); margin: 0; padding: 20px; 
            min-height: 100vh; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), var(--bg-image);
            background-size: cover; background-position: center; background-attachment: fixed;
            transition: all 0.4s ease; overflow-x: hidden;
        }
        .container { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
        header { text-align: center; padding: 60px 0 40px 0; }
        h1 { margin: 0; font-size: 3.5rem; color: var(--primary); text-transform: uppercase; letter-spacing: 4px; text-shadow: var(--glow); }
        .subtitle { color: var(--subtext); margin-top: 10px; font-size: 1.2rem; font-weight: 600; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        
        .nav-buttons { position: fixed; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000; }
        .btn { 
            background: var(--primary); color: white; border: none; padding: 12px 20px; 
            border-radius: 30px; cursor: pointer; font-weight: bold; box-shadow: var(--glow); 
            text-decoration: none; font-size: 14px; transition: 0.3s;
        }
        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        .subject-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-top: 20px; }
        .subject-card { 
            background: var(--card-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); 
            padding: 40px 25px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.15); 
            transition: all 0.3s ease; text-align: center;
        }
        .subject-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: var(--glow); background: rgba(188, 19, 254, 0.05); }
        .subject-card h2 { margin: 0; color: var(--primary); font-size: 1.6rem; text-shadow: var(--glow); }
        
        footer { text-align: center; margin-top: 60px; color: var(--subtext); padding-bottom: 40px; }
    </style>
</head>
<body>
<canvas id="starfield"></canvas>
<div class="nav-buttons">
    <a href="index.html" class="btn">🏠 Dashboard</a>
    <button class="btn" onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
</div>
<div class="container">
    <header>
        <h1>📖 English</h1>
        <p class="subtitle">Notes, And More!</p>
    </header>
    <div class="subject-grid">
        <div class="subject-card"><h2>Lorem Ipsum</h2></div>
        <div class="subject-card"><h2>Dolor Sit</h2></div>
        <div class="subject-card"><h2>Amet Consectetur</h2></div>
        <div class="subject-card"><h2>Adipiscing Elit</h2></div>
        <div class="subject-card"><h2>Sed Do</h2></div>
        <div class="subject-card"><h2>Eiusmod Tempor</h2></div>
        <div class="subject-card"><h2>Incididunt Ut</h2></div>
        <div class="subject-card"><h2>Labore Et</h2></div>
        <div class="subject-card"><h2>Dolore Magna</h2></div>
        <div class="subject-card"><h2>Aliqua Enim</h2></div>
    </div>
    <footer><p>Stay Bright. Study Hard. ⚡</p></footer>
</div>
<script>
    function toggleTheme() {
        const body = document.documentElement;
        const btn = document.getElementById('themeBtn');
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            btn.innerHTML = "🌙 Dark Mode";
        } else {
            body.setAttribute('data-theme', 'dark');
            btn.innerHTML = "☀️ Light Mode";
        }
    }
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let width, height, stars = [];
    function init() {
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
        stars = [];
        for (let i = 0; i < 400; i++) {
            stars.push({ x: Math.random() * width - width / 2, y: Math.random() * height - height / 2, z: Math.random() * width, opacity: Math.random() });
        }
    }
    function draw() {
        ctx.clearRect(0, 0, width, height);
        for (let i = 0; i < 400; i++) {
            let star = stars[i];
            star.z -= 1.2;
            if (star.z <= 0) star.z = width;
            const sx = (star.x / star.z) * (width / 2) + width / 2;
            const sy = (star.y / star.z) * (height / 2) + height / 2;
            const size = (1 - star.z / width) * 2.5;
            ctx.beginPath();
            ctx.fillStyle = `rgba(188, 19, 254, ${star.opacity})`;
            ctx.arc(sx, sy, size, 0, Math.PI * 2);
            ctx.fill();
        }
        requestAnimationFrame(draw);
    }
    window.addEventListener('resize', init);
    init(); draw();
</script>
</body>
</html>
