<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyVault | Pro Focus Suite</title>
    <style>
        :root {
            --primary: #bc13fe; 
            --text: #ffffff;
            --subtext: #cbd5e1;
            --bg-image: url('https://w0.peakpx.com/wallpaper/700/152/HD-wallpaper-mountains-in-dark-night-background-dark.jpg');
            --card-bg: rgba(255, 255, 255, 0.07); 
            --glow: 0 0 15px rgba(188, 19, 254, 0.6);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .nav-header { max-width: 1300px; margin: 0 auto 30px; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { text-decoration: none; color: var(--subtext); font-weight: 600; transition: 0.3s; }
        .back-btn:hover { color: var(--primary); }

        .main-layout {
            max-width: 1300px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            gap: 20px;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .section-title { font-size: 1rem; color: var(--primary); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 800; }

        /* --- Legend / Category Sidebar --- */
        .legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 8px; }
        .legend-item input[type="color"] { border: none; width: 25px; height: 25px; cursor: pointer; background: none; }
        .legend-item input[type="text"] { background: none; border: none; color: white; width: 60px; font-size: 0.9rem; text-align: center; }
        .category-label { flex: 1; background: none; border: none; color: var(--subtext); font-size: 0.8rem; outline: none; }

        /* --- Calendar Styling --- */
        #calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 15px; }
        .cal-day { 
            min-height: 80px; 
            background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 10px; 
            font-size: 0.75rem; 
            padding: 8px; 
            position: relative; 
            cursor: pointer;
            transition: 0.2s;
        }
        .cal-day:hover { background: rgba(255,255,255,0.08); border-color: var(--primary); }
        .day-num { font-weight: bold; opacity: 0.5; margin-bottom: 5px; display: block; }
        .event-bar { 
            font-size: 0.65rem; 
            padding: 2px 5px; 
            border-radius: 4px; 
            margin-top: 4px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            border-left: 3px solid transparent;
        }

        /* --- Timer & Others --- */
        .timer-display { font-size: 4rem; font-weight: 800; text-align: center; margin: 15px 0; text-shadow: var(--glow); font-family: monospace; }
        .btn { background: var(--primary); border: none; color: white; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn:hover { box-shadow: var(--glow); transform: translateY(-2px); }
        
        input, select { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; color: white; outline: none; }

        .list-item { background: rgba(255,255,255,0.03); margin-bottom: 8px; padding: 10px; border-radius: 10px; display: flex; align-items: center; gap: 10px; }
        .list-item.done span { text-decoration: line-through; color: rgba(255,255,255,0.4); }

        @media (max-width: 1100px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="index.html" class="back-btn">← Back to Dashboard</a>
        <div style="font-weight: 800; letter-spacing: 2px; color: var(--primary);">STUDYVAULT PRO</div>
    </div>

    <div class="main-layout">
        
        <div style="display: flex; flex-direction: column; gap: 20px;">
            <div class="glass-card">
                <div class="section-title">🎨 Categories</div>
                <div id="legendContainer">
                    <div class="legend-item">
                        <input type="color" id="col1" value="#ff4d4d" onchange="saveLegend()">
                        <input type="text" id="emoji1" value="🔴" onchange="saveLegend()">
                        <input type="text" id="lab1" class="category-label" value="Exams" onchange="saveLegend()">
                    </div>
                    <div class="legend-item">
                        <input type="color" id="col2" value="#4dff88" onchange="saveLegend()">
                        <input type="text" id="emoji2" value="🟢" onchange="saveLegend()">
                        <input type="text" id="lab2" class="category-label" value="Exercise" onchange="saveLegend()">
                    </div>
                    <div class="legend-item">
                        <input type="color" id="col3" value="#4d94ff" onchange="saveLegend()">
                        <input type="text" id="emoji3" value="🔵" onchange="saveLegend()">
                        <input type="text" id="lab3" class="category-label" value="Reading" onchange="saveLegend()">
                    </div>
                </div>
            </div>

            <div class="glass-card">
                <div class="section-title">⏱️ Session</div>
                <div class="timer-display" id="display">25:00</div>
                <button class="btn" onclick="toggleTimer()" id="startBtn">START</button>
            </div>
        </div>

        <div class="glass-card">
            <div class="section-title">🗓️ Interactive Planner</div>
            <div id="calendar"></div>
            
            <div id="eventEditor" style="margin-top: 20px; display: none; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px;">
                <div style="display:flex; gap: 10px; margin-bottom:10px;">
                    <select id="catSelect">
                        <option value="1">Category 1</option>
                        <option value="2">Category 2</option>
                        <option value="3">Category 3</option>
                    </select>
                    <input type="text" id="eventText" placeholder="Event Name..." style="flex:1">
                </div>
                <button class="btn" onclick="saveEvent()">Save to Calendar</button>
            </div>
        </div>

        <div class="glass-card">
            <div class="section-title">⚖️ Accountability</div>
            <div style="display:flex; gap:5px; margin-bottom:15px;">
                <input type="text" id="taskInput" placeholder="Add custom goal..." style="flex:1">
                <button class="btn" onclick="addTask()" style="width: auto;">Add</button>
            </div>
            <div id="currentTasks"></div>
            
            <div class="section-title" style="margin-top:30px; font-size:0.8rem; opacity:0.6;">History (7 Days)</div>
            <div id="historyContainer"></div>
        </div>

    </div>

    <script>
        // --- DATA PERSISTENCE ---
        let vaultData = JSON.parse(localStorage.getItem('proVaultData')) || {
            tasks: [],
            history: {},
            calendar: {},
            legend: [
                {col: '#ff4d4d', emo: '🔴', lab: 'Exams'},
                {col: '#4dff88', emo: '🟢', lab: 'Exercise'},
                {col: '#4d94ff', emo: '🔵', lab: 'Reading'}
            ]
        };

        // --- LEGEND LOGIC ---
        function saveLegend() {
            for(let i=1; i<=3; i++) {
                vaultData.legend[i-1] = {
                    col: document.getElementById(`col${i}`).value,
                    emo: document.getElementById(`emoji${i}`).value,
                    lab: document.getElementById(`lab${i}`).value
                };
            }
            saveData();
            renderCalendar();
        }

        function loadLegend() {
            vaultData.legend.forEach((item, i) => {
                document.getElementById(`col${i+1}`).value = item.col;
                document.getElementById(`emoji${i+1}`).value = item.emo;
                document.getElementById(`lab${i+1}`).value = item.lab;
            });
        }

        // --- CALENDAR LOGIC ---
        let selectedDay = null;

        function renderCalendar() {
            const cal = document.getElementById('calendar');
            cal.innerHTML = "";
            for (let i = 1; i <= 28; i++) { // Render 4 weeks for simplicity
                const dayData = vaultData.calendar[i] || null;
                let eventHtml = "";
                if(dayData) {
                    const cat = vaultData.legend[dayData.cat - 1];
                    eventHtml = `<div class="event-bar" style="background:${cat.col}33; border-left-color:${cat.col}; color:white;">
                        ${cat.emo} ${dayData.text}
                    </div>`;
                }
                cal.innerHTML += `<div class="cal-day" onclick="openEditor(${i})">
                    <span class="day-num">${i}</span>
                    ${eventHtml}
                </div>`;
            }
        }

        function openEditor(day) {
            selectedDay = day;
            document.getElementById('eventEditor').style.display = "block";
            document.getElementById('eventText').focus();
        }

        function saveEvent() {
            const text = document.getElementById('eventText').value;
            const cat = document.getElementById('catSelect').value;
            if(!text) return;
            vaultData.calendar[selectedDay] = { text, cat };
            saveData();
            renderCalendar();
            document.getElementById('eventEditor').style.display = "none";
            document.getElementById('eventText').value = "";
        }

        // --- TASK LOGIC ---
        function addTask() {
            const input = document.getElementById('taskInput');
            if(!input.value) return;
            vaultData.tasks.push({ id: Date.now(), text: input.value, done: false, date: new Date().toLocaleDateString() });
            input.value = "";
            saveData();
            renderTasks();
        }

        function toggleTask(id) {
            const task = vaultData.tasks.find(t => t.id === id);
            if(task) task.done = !task.done;
            saveData();
            renderTasks();
        }

        function renderTasks() {
            const container = document.getElementById('currentTasks');
            container.innerHTML = "";
            vaultData.tasks.forEach(t => {
                container.innerHTML += `<div class="list-item ${t.done ? 'done' : ''}">
                    <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${t.id})">
                    <span style="flex:1">${t.text}</span>
                </div>`;
            });
        }

        // --- TIMER LOGIC ---
        let timeLeft = 25 * 60;
        let timerId = null;
        function toggleTimer() {
            if(timerId) { clearInterval(timerId); timerId = null; document.getElementById('startBtn').textContent = "START"; }
            else {
                timerId = setInterval(() => {
                    timeLeft--;
                    const m = Math.floor(timeLeft/60); const s = timeLeft%60;
                    document.getElementById('display').textContent = `${m}:${s < 10 ? '0'+s : s}`;
                }, 1000);
                document.getElementById('startBtn').textContent = "PAUSE";
            }
        }

        function saveData() { localStorage.setItem('proVaultData', JSON.stringify(vaultData)); }

        // Init
        loadLegend();
        renderCalendar();
        renderTasks();
    </script>
</body>
</html>
