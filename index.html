<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyVault | Neon Mountains</title>
    <style>
        :root {
            --primary: #bc13fe; 
            --text: #ffffff;
            --subtext: #cbd5e1;
            --bg-image: url('https://w0.peakpx.com/wallpaper/700/152/HD-wallpaper-mountains-in-dark-night-background-dark.jpg');
            --card-bg: rgba(255, 255, 255, 0.07); 
            --link-bg: rgba(255, 255, 255, 0.1);
            --glow: 0 0 15px rgba(188, 19, 254, 0.8);
            --pomo-bg: rgba(255, 255, 255, 0.03);
        }

        [data-theme="dark"] {
            --primary: #df16ff;
            --card-bg: rgba(0, 0, 0, 0.6);
            --link-bg: rgba(255, 255, 255, 0.05);
            --pomo-bg: rgba(0, 0, 0, 0.7);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: all 0.4s ease;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        .nav-panel {
            position: fixed;
            top: 34px;
            right: 190px;
            z-index: 1000;
            display: flex;
            gap: 25px;
        }

        .nav-link {
            color: var(--text);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            transition: 0.3s;
            opacity: 0.7;
        }

        .nav-link:hover { color: var(--primary); opacity: 1; text-shadow: var(--glow); }

        .logo-box {
            position: fixed;
            top: 25px;
            left: 25px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .flash-icon { font-size: 1.8rem; text-shadow: var(--glow); }

        .logo-text { font-weight: 800; letter-spacing: 2px; font-size: 1.1rem; text-transform: uppercase; }

        .container { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }

        header { text-align: center; padding: 60px 0 20px 0; }
        
        h1 { 
            margin: 0; font-size: 3.5rem; color: var(--primary); 
            text-transform: uppercase; letter-spacing: 5px;
            text-shadow: var(--glow);
        }

        /* --- SEARCH & GRID --- */
        .search-wrapper { margin: 30px auto; max-width: 500px; }
        #subjectSearch {
            width: 100%; padding: 15px 25px; border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px);
            color: white; font-size: 1.1rem; outline: none; text-align: center;
        }

        .subject-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .subject-card { 
            background: var(--card-bg); backdrop-filter: blur(15px);
            padding: 25px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.15);
            transition: 0.3s;
        }
        .subject-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: var(--glow); }

        /* --- AI ASSISTANT STYLES --- */
        .ai-fab {
            position: fixed; bottom: 30px; right: 30px;
            width: 60px; height: 60px; background: var(--primary);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; cursor: pointer; z-index: 2000;
            box-shadow: var(--glow); transition: 0.3s;
            font-weight: 900; color: white; border: none;
        }
        .ai-fab:hover { transform: scale(1.1) rotate(5deg); }

        .ai-panel {
            position: fixed; bottom: 100px; right: 30px;
            width: 350px; height: 500px; background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(20px); border-radius: 20px;
            border: 1px solid var(--primary); z-index: 1999;
            display: none; flex-direction: column; overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .ai-header {
            padding: 15px; background: var(--primary); display: flex;
            justify-content: space-between; align-items: center;
        }

        .ai-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 80%; font-size: 0.9rem; line-height: 1.4; }
        .msg-user { align-self: flex-end; background: var(--primary); color: white; }
        .msg-ai { align-self: flex-start; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.1); }

        .ai-input-area { padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 10px; }
        .ai-input { 
            flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 12px; border-radius: 8px; color: white; outline: none;
        }

        .history-btn { font-size: 0.7rem; background: rgba(0,0,0,0.3); border: none; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; }

        /* Existing utility styles */
        .theme-toggle { position: fixed; top: 25px; right: 25px; background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; z-index: 1000; font-weight: bold; }
        .hidden { display: none; }
        #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
    </style>
</head>
<body>

<canvas id="starfield"></canvas>

<div class="logo-box">
    <span class="flash-icon">⚡</span>
    <span class="logo-text">StudyVault</span>
</div>

<div class="nav-panel">
    <a href="#" class="nav-link">Pomodoro</a>
    <a href="#" class="nav-link">Accountability</a>
</div>

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>

<div class="container">
    <header>
        <h1>StudyVault</h1>
        <p id="dynamicGreeting" style="font-style: italic; color: var(--subtext);"></p>
    </header>

    <div class="search-wrapper">
        <input type="text" id="subjectSearch" placeholder="Search by name or code..." onkeyup="filterSubjects()">
    </div>

    <div class="subject-grid" id="subjectGrid">
        <div class="subject-card">
            <h2>English <span class="subject-code">1123</span></h2>
            <p>Resources for O-Level English Language.</p>
        </div>
        <div class="subject-card">
            <h2>Physics <span class="subject-code">5054</span></h2>
            <p>Notes for O-Level Physics.</p>
        </div>
        </div>
</div>

<button class="ai-fab" onclick="toggleAI()">AI</button>

<div class="ai-panel" id="aiPanel">
    <div class="ai-header">
        <span style="font-weight: bold; font-size: 0.8rem;">STUDY AI v1.0</span>
        <div style="display: flex; gap: 5px;">
            <button class="history-btn" onclick="clearChat()">New Chat</button>
            <button class="history-btn" onclick="toggleAI()">✕</button>
        </div>
    </div>
    <div class="ai-messages" id="aiMessages">
        </div>
    <div class="ai-input-area">
        <input type="text" class="ai-input" id="aiInput" placeholder="Ask anything..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()" style="background: var(--primary); border: none; color: white; border-radius: 8px; padding: 0 12px; cursor: pointer;">→</button>
    </div>
</div>

<script>
    // --- AI LOGIC ---
    const aiPanel = document.getElementById('aiPanel');
    const aiMessages = document.getElementById('aiMessages');
    const aiInput = document.getElementById('aiInput');

    function toggleAI() {
        aiPanel.style.display = aiPanel.style.display === 'flex' ? 'none' : 'flex';
        if (aiPanel.style.display === 'flex') loadHistory();
    }

    function sendMessage() {
        const text = aiInput.value.trim();
        if (!text) return;

        appendMessage('user', text);
        aiInput.value = '';

        // Simulate AI Thinking
        setTimeout(() => {
            const response = generateAIResponse(text);
            appendMessage('ai', response);
            saveHistory();
        }, 600);
    }

    function appendMessage(sender, text) {
        const div = document.createElement('div');
        div.className = `msg msg-${sender}`;
        div.textContent = text;
        aiMessages.appendChild(div);
        aiMessages.scrollTop = aiMessages.scrollHeight;
    }

    function generateAIResponse(input) {
        const query = input.toLowerCase();
        if (query.includes('hello') || query.includes('hi')) return "Hey there! Ready to crush some study goals today?";
        if (query.includes('subjects') || query.includes('page')) return "On this page, you have resources for English (1123) and Physics (5054). Need notes for one of them?";
        if (query.includes('exam')) return "Exams are tough, but consistency is key. Try the Pomodoro timer above to stay focused!";
        return "That's a great question! I'm here to help you navigate StudyVault. Want me to explain a specific subject code?";
    }

    function saveHistory() {
        localStorage.setItem('study_chat_history', aiMessages.innerHTML);
    }

    function loadHistory() {
        const history = localStorage.getItem('study_chat_history');
        if (history) {
            aiMessages.innerHTML = history;
        } else {
            appendMessage('ai', "Welcome to StudyVault AI. Ask me about your subjects or for study tips!");
        }
    }

    function clearChat() {
        localStorage.removeItem('study_chat_history');
        aiMessages.innerHTML = '';
        appendMessage('ai', "New session started. How can I help?");
    }

    // --- UTILITY LOGIC ---
    function toggleTheme() {
        const body = document.documentElement;
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
        } else {
            body.setAttribute('data-theme', 'dark');
        }
    }

    function filterSubjects() {
        let input = document.getElementById('subjectSearch').value.toLowerCase();
        let cards = document.getElementsByClassName('subject-card');
        for (let card of cards) {
            card.classList.toggle('hidden', !card.innerText.toLowerCase().includes(input));
        }
    }

    // --- STARFIELD CANVAS ---
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let width, height, stars = [];

    function initStars() {
        width = window.innerWidth; height = window.innerHeight;
        canvas.width = width; canvas.height = height;
        stars = Array.from({length: 200}, () => ({
            x: Math.random() * width, y: Math.random() * height,
            size: Math.random() * 2, speed: Math.random() * 0.5 + 0.2
        }));
    }

    function animateStars() {
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = "rgba(188, 19, 254, 0.5)";
        stars.forEach(s => {
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
            ctx.fill();
            s.y += s.speed;
            if (s.y > height) s.y = 0;
        });
        requestAnimationFrame(animateStars);
    }

    window.addEventListener('resize', initStars);
    initStars(); animateStars();
</script>

</body>
</html>
